name: fabric-iq-labs
metadata:
  template: azd-init

services:
  api:
    project: ./app/backend
    language: python
    host: containerapp
    hooks:
      prepackage:
        shell: pwsh
        run: Copy-Item -Recurse -Force "..\..\data" ".\data"

  web:
    project: ./app/frontend
    host: staticwebapp
    dist: .
